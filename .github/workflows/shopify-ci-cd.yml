name: Shopify Theme CI/CD

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: shopify-theme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + Theme validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (Vitest)
        run: npm run test --if-present

      - name: Theme Check (Liquid + schema)
        run: npx shopify theme check --path . --fail-level error

  deploy_dev:
    name: Deploy to DEV theme (automatic)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets (optional)
        run: npm run build --if-present

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Deploy to DEV theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          shopify theme push \
            --store="$SHOPIFY_FLAG_STORE" \
            --theme="${{ secrets.SHOPIFY_DEV_THEME_ID }}" \
            --unpublished \
            --json

  deploy_prod:
    name: Deploy to PROD theme (manual)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets (optional)
        run: npm run build --if-present

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Deploy to LIVE theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          shopify theme push \
            --store="$SHOPIFY_FLAG_STORE" \
            --theme="${{ secrets.SHOPIFY_LIVE_THEME_ID }}" \
            --live \
            --json