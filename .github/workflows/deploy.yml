name: CI/CD Theme

on:
  # CI: Run on all PRs to main
  pull_request:
    branches:
      - main

  # CD: Deploy on push to main
  push:
    branches:
      - main

  # Manual deploy trigger
  workflow_dispatch:

# Prevent concurrent runs on same ref
concurrency:
  group: theme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # JOB 1: Lint (Theme Check)
  # Runs on: PRs, push to main, manual
  # ============================================
  lint:
    name: Theme Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Run Theme Check
        uses: shopify/theme-check-action@v2
        with:
          theme_root: '.'

  # ============================================
  # JOB 2: Build and Test
  # Runs on: PRs, push to main, manual
  # ============================================
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build assets
        run: npm run build

  # ============================================
  # JOB 3: Deploy to Shopify
  # Runs on: push to main, manual ONLY
  # Requires: lint + build-test to pass
  # ============================================
  deploy:
    name: Deploy to Shopify
    runs-on: ubuntu-latest
    needs: [lint, build-test]

    # Only deploy on push to main or manual trigger (NOT on PRs)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          shopify theme push \
            --path . \
            --store "$SHOPIFY_FLAG_STORE" \
            --theme "${{ secrets.SHOPIFY_THEME_ID }}" \
            --allow-live
